<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rap Generator</title>
    <style>
        :root {
            --bg-color: #0b0216;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #9d4edd;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #3c096c, var(--bg-color) 60%);
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", sans-serif;
            color: #fff;
            padding: 20px;
            box-sizing: border-box;
        }
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 
                0 24px 48px rgba(0, 0, 0, 0.4), 
                inset 0 2px 4px rgba(255, 255, 255, 0.15),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h2 { margin: 0; text-align: center; font-weight: 600; font-size: 24px; letter-spacing: -0.5px; }
        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s ease;
        }
        input:focus { border-color: var(--primary); }
        button {
            background: linear-gradient(135deg, #7b2cbf, #5a189a);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(123, 44, 191, 0.3);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #output {
            margin-top: 10px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.9);
            max-height: 400px;
            overflow-y: auto;
        }
        /* Scrollbar nascosta per pulizia visiva */
        #output::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="liquid-glass">
        <h2>Rap Generator</h2>
        <input type="text" id="rapper" placeholder="Nome del Rapper (es. Marracash)" required>
        <input type="text" id="tema" placeholder="Tema (es. Soldi e tradimento)" required>
        <button id="generateBtn" onclick="generateRap()">Genera 16 Barre</button>
        <div id="output"></div>
    </div>

    <script>
        // SOSTITUISCI CON L'URL DEL TUO WORKER CLOUDFLARE
        const WORKER_URL = "https://gemini.debellis-marcello.workers.dev";

        async function generateRap() {
            const rapper = document.getElementById('rapper').value;
            const tema = document.getElementById('tema').value;
            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');

            if (!rapper || !tema) return alert("Compila entrambi i campi.");

            btn.disabled = true;
            btn.innerText = "Generazione in corso...";
            output.innerText = "";

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rapper, tema })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                output.innerText = data.text;
                
            } catch (error) {
                output.innerText = "Errore: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Genera 16 Barre";
            }
        }
    </script>
</body>
</html>
